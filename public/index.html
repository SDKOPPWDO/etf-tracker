<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 下跌加碼計算器</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --card: #1a2235;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #00e676;
    --red: #ff3d5a;
    --yellow: #ffd600;
    --text: #e8f4ff;
    --muted: #6b8db8;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'Noto Sans TC', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.05) 0%, transparent 50%);
  }
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(17,24,39,0.9);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--accent); }
  .logo span { color: var(--accent2); }
  header p { font-size: 12px; color: var(--muted); }
  .status-bar { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); }
  .sdot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; }
  .sdot.live { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
  .sdot.err  { background:var(--red); }
  .sdot.loading { background:var(--yellow); animation:pulse .6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; display: grid; gap: 20px; }

  .top-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .etf-btn {
    font-family: var(--font-mono); font-size: 14px; font-weight: 700;
    padding: 10px 22px; border: 2px solid var(--border);
    background: var(--card); color: var(--muted); border-radius: 6px;
    cursor: pointer; transition: all .2s; letter-spacing: 1px;
  }
  .etf-btn:hover { border-color: var(--accent); color: var(--accent); }
  .etf-btn.active-smh { border-color:var(--accent2); background:rgba(255,107,53,.12); color:var(--accent2); box-shadow:0 0 16px rgba(255,107,53,.25); }
  .etf-btn.active-tw  { border-color:var(--yellow); background:rgba(255,214,0,.1); color:var(--yellow); box-shadow:0 0 16px rgba(255,214,0,.2); }
  .etf-btn.active-voo { border-color:var(--accent); background:rgba(0,212,255,.1); color:var(--accent); box-shadow:0 0 16px rgba(0,212,255,.2); }

  .fetch-btn {
    font-family: var(--font-mono); font-size: 13px;
    padding: 10px 24px; background: linear-gradient(135deg, var(--accent), #0099cc);
    color: #000; font-weight: 700; border: none; border-radius: 6px;
    cursor: pointer; transition: all .2s; letter-spacing: 1px;
  }
  .fetch-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,212,255,.3); }
  .fetch-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

  /* Manual fallback */
  .input-panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 22px; position: relative; overflow: hidden;
  }
  .input-panel::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, var(--accent2), var(--yellow), var(--accent));
  }
  .panel-toggle {
    display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    user-select: none;
  }
  .panel-toggle-icon { font-size: 12px; color: var(--muted); transition: transform .2s; }
  .panel-toggle-icon.open { transform: rotate(180deg); }
  .input-body { margin-top: 16px; }
  .input-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 16px; align-items: end; }
  .input-group { display: flex; flex-direction: column; gap: 8px; }
  .input-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
  .price-input {
    font-family: var(--font-mono); font-size: 18px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 12px 16px; border-radius: 8px;
    width: 100%; transition: border-color .2s;
  }
  .price-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,212,255,.1); }
  .price-input::placeholder { color:var(--muted); }
  .calc-btn {
    font-family: var(--font-mono); font-size: 13px;
    padding: 12px 24px; background: rgba(0,212,255,.15);
    color: var(--accent); font-weight: 700; border: 1px solid var(--accent); border-radius: 8px;
    cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .calc-btn:hover { background: rgba(0,212,255,.25); }

  /* Price panel */
  .price-panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 22px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 20px;
    position: relative; overflow: hidden;
  }
  .price-panel::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .pstat { display:flex; flex-direction:column; gap:5px; }
  .pstat label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; }
  .pval { font-family:var(--font-mono); font-size:26px; font-weight:700; }
  .pval.c-accent { color:var(--accent); }
  .pval.c-green  { color:var(--green); }
  .pval.c-red    { color:var(--red); }
  .pval.c-yellow { color:var(--yellow); }
  .psub { font-size:11px; color:var(--muted); }
  .pchange.up   { color:var(--green); }
  .pchange.down { color:var(--red); }

  .sec { font-family:var(--font-mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:3px; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .sec::after { content:''; flex:1; height:1px; background:var(--border); }

  .drop-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(170px,1fr)); gap:10px; }
  .drop-card {
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:16px; transition:all .2s; position:relative; overflow:hidden;
  }
  .drop-card:hover { border-color:rgba(0,212,255,.4); transform:translateY(-2px); }
  .drop-card.is-below { border-color:rgba(0,230,118,.35); background:rgba(0,230,118,.04); }
  .dpct { font-family:var(--font-mono); font-size:22px; font-weight:700; margin-bottom:4px; }
  .dpct.mild { color:var(--yellow); }
  .dpct.moderate { color:var(--accent2); }
  .dpct.deep { color:var(--red); }
  .dprice { font-family:var(--font-mono); font-size:17px; color:var(--text); margin:2px 0; }
  .dfrom { font-size:11px; margin-top:4px; }
  .dfrom.above { color:var(--muted); }
  .dfrom.below { color:var(--green); font-weight:500; }
  .reached-badge {
    position:absolute; top:10px; right:10px;
    font-size:9px; font-weight:700; padding:2px 7px;
    background:var(--green); color:#000; border-radius:3px; letter-spacing:1px;
  }

  .calc-panel {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:22px; position:relative; overflow:hidden;
  }
  .calc-panel::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg, var(--accent2), var(--yellow));
  }
  .calc-rows { display:grid; gap:8px; margin-bottom:18px; }
  .calc-row { display:grid; grid-template-columns:85px 145px 1fr; gap:10px; align-items:center; }
  .clabel { font-family:var(--font-mono); font-size:14px; font-weight:700; }
  .clabel.mild { color:var(--yellow); }
  .clabel.moderate { color:var(--accent2); }
  .clabel.deep { color:var(--red); }
  .cref { font-size:12px; color:var(--muted); font-family:var(--font-mono); }
  .cinput {
    font-family:var(--font-mono); font-size:15px;
    background:var(--bg); border:1px solid var(--border);
    color:var(--text); padding:9px 12px; border-radius:6px; text-align:right; width:100%;
  }
  .cinput:focus { outline:none; border-color:var(--accent); }
  .cinput::placeholder { color:var(--muted); opacity:.6; }
  .calc-total {
    border-top:1px solid var(--border); padding-top:18px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  .tlabel { font-family:var(--font-mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:4px; }
  .tval { font-family:var(--font-mono); font-size:30px; font-weight:700; color:var(--green); }
  .clear-btn {
    font-family:var(--font-mono); font-size:11px; padding:8px 16px;
    background:transparent; border:1px solid var(--border); color:var(--muted);
    border-radius:6px; cursor:pointer; transition:all .2s;
  }
  .clear-btn:hover { border-color:var(--red); color:var(--red); }

  .note { font-size:11px; color:var(--muted); background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:6px; padding:12px 16px; line-height:1.8; }
  .note strong { color:var(--accent); }

  @media(max-width:600px){
    .input-grid { grid-template-columns:1fr 1fr; }
    .calc-btn { grid-column:1/-1; }
    .calc-row { grid-template-columns:70px 1fr; }
    .cref { display:none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">ETF <span>DIP</span> TRACKER</div>
    <p>下跌加碼計算工具 · SMH / 00981A / VOO</p>
  </div>
  <div class="status-bar">
    <div class="sdot" id="sdot"></div>
    <span id="stext">尚未載入</span>
  </div>
</header>

<div class="main">

  <!-- ETF + Fetch -->
  <div class="top-row">
    <button class="etf-btn active-smh" data-etf="SMH"    onclick="selectETF('SMH')">SMH</button>
    <button class="etf-btn"            data-etf="00981A" onclick="selectETF('00981A')">00981A</button>
    <button class="etf-btn"            data-etf="VOO"    onclick="selectETF('VOO')">VOO</button>
    <button class="fetch-btn" id="fetchBtn" onclick="fetchData()">▶ 自動抓取</button>
  </div>

  <!-- 手動輸入（收合） -->
  <div class="input-panel">
    <div class="panel-toggle" onclick="toggleManual()">
      <div class="sec" style="margin:0">手動輸入價格（備用）</div>
      <span class="panel-toggle-icon" id="toggleIcon">▼</span>
    </div>
    <div class="input-body" id="inputBody" style="display:none">
      <div class="input-grid" style="margin-top:16px">
        <div class="input-group">
          <label>今日收盤價</label>
          <input class="price-input" id="inputClose" type="number" placeholder="e.g. 210.50" step="0.01" min="0">
        </div>
        <div class="input-group">
          <label>歷史最高價 (ATH)</label>
          <input class="price-input" id="inputATH" type="number" placeholder="e.g. 283.00" step="0.01" min="0">
        </div>
        <button class="calc-btn" onclick="manualCalc()">套用</button>
      </div>
    </div>
  </div>

  <!-- 價格摘要 -->
  <div class="price-panel" id="pricePanel" style="display:none">
    <div class="pstat">
      <label>今日收盤</label>
      <div class="pval c-accent" id="dispClose">—</div>
      <div class="psub pchange" id="dispChange">—</div>
    </div>
    <div class="pstat">
      <label>歷史最高 (ATH)</label>
      <div class="pval c-green" id="dispATH">—</div>
      <div class="psub" id="dispATHDate">—</div>
    </div>
    <div class="pstat">
      <label>距離 ATH</label>
      <div class="pval" id="dispDiff">—</div>
      <div class="psub">現價相對最高點</div>
    </div>
    <div class="pstat">
      <label>ETF</label>
      <div class="pval c-yellow" id="dispName">—</div>
      <div class="psub" id="dispCurr">—</div>
    </div>
  </div>

  <!-- 下跌對照表 -->
  <div id="dropSection" style="display:none">
    <div class="sec">下跌價位對照表</div>
    <div class="drop-grid" id="dropGrid"></div>
  </div>

  <!-- 加碼計算器 -->
  <div id="calcSection" style="display:none">
    <div class="calc-panel">
      <div class="sec">加碼金額計算器</div>
      <div class="calc-rows" id="calcRows"></div>
      <div class="calc-total">
        <div>
          <div class="tlabel">總加碼金額</div>
          <div class="tval" id="totalAmt">$0</div>
        </div>
        <button class="clear-btn" onclick="clearCalc()">清除全部</button>
      </div>
    </div>
  </div>

  <div class="note">
    💡 <strong>自動抓取</strong> 透過後端 API 從 Yahoo Finance 即時取得收盤價與 5 年 ATH。
    若抓取失敗，可展開「手動輸入」備用。價格查詢：Google 搜尋 <strong>SMH stock</strong> 或 Yahoo Finance。
  </div>

</div>

<script>
const ETFS = {
  SMH:      { label:'SMH',    name:'VanEck 半導體 ETF', symbol:'SMH',      currency:'USD', prefix:'$',   dec:2 },
  '00981A': { label:'00981A', name:'元大半導體 ETF',    symbol:'00981A.TW', currency:'TWD', prefix:'NT$', dec:2 },
  VOO:      { label:'VOO',    name:'Vanguard S&P 500',  symbol:'VOO',       currency:'USD', prefix:'$',   dec:2 },
};

const DROPS = [10,15,20,25,30,35,40,45];
let curETF = 'SMH';
let curClose = null, curATH = null;

function selectETF(etf) {
  curETF = etf;
  document.querySelectorAll('.etf-btn').forEach(b => {
    b.className = 'etf-btn';
    if (b.dataset.etf === etf)
      b.classList.add(etf==='SMH' ? 'active-smh' : etf==='00981A' ? 'active-tw' : 'active-voo');
  });
  hideResults();
  setStatus('', '尚未載入');
}

function toggleManual() {
  const body = document.getElementById('inputBody');
  const icon = document.getElementById('toggleIcon');
  const open = body.style.display === 'none';
  body.style.display = open ? '' : 'none';
  icon.className = 'panel-toggle-icon' + (open ? ' open' : '');
}

function setStatus(type, msg) {
  const dot = document.getElementById('sdot');
  dot.className = 'sdot' + (type ? ' '+type : '');
  document.getElementById('stext').textContent = msg;
}

function hideResults() {
  ['pricePanel','dropSection','calcSection'].forEach(id => document.getElementById(id).style.display='none');
}

function fmt(v, dec, prefix) {
  if (v===null||isNaN(v)) return '—';
  return prefix + v.toFixed(dec).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}

function dropClass(pct) { return pct<=15?'mild':pct<=30?'moderate':'deep'; }

async function fetchData() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '載入中...';
  setStatus('loading', '連線中...');

  const cfg = ETFS[curETF];
  try {
    const res = await fetch(`/api/quote?symbol=${cfg.symbol}`);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const d = await res.json();
    if (d.error) throw new Error(d.error);

    render(d.close, d.ath, d.ath_date, d.change, d.change_pct);
    const t = new Date().toLocaleTimeString('zh-TW');
    setStatus('live', `更新於 ${t}`);
  } catch(e) {
    setStatus('err', '抓取失敗，請用手動輸入');
    // open manual panel
    const body = document.getElementById('inputBody');
    if (body.style.display==='none') toggleManual();
  }

  btn.disabled = false;
  btn.textContent = '▶ 自動抓取';
}

function manualCalc() {
  const close = parseFloat(document.getElementById('inputClose').value);
  const ath   = parseFloat(document.getElementById('inputATH').value);
  if (!close||!ath||close<=0||ath<=0) { alert('請輸入有效價格'); return; }
  render(close, ath, null, null, null);
  setStatus('live', '手動輸入');
}

function render(close, ath, athDate, change, changePct) {
  curClose = close; curATH = ath;
  const cfg = ETFS[curETF];
  const { prefix, dec, label, name, currency } = cfg;

  // price panel
  document.getElementById('dispClose').textContent = fmt(close, dec, prefix);
  const chgEl = document.getElementById('dispChange');
  if (change !== null) {
    const sign = change >= 0 ? '+' : '';
    chgEl.textContent = `${sign}${fmt(change, dec, prefix)} (${sign}${changePct.toFixed(2)}%)`;
    chgEl.className = 'psub pchange ' + (change >= 0 ? 'up' : 'down');
  } else { chgEl.textContent = '手動輸入'; chgEl.className = 'psub pchange'; }

  document.getElementById('dispATH').textContent = fmt(ath, dec, prefix);
  document.getElementById('dispATHDate').textContent = athDate ? `ATH 日期：${athDate}` : 'ATH（手動）';

  const diff = ((close - ath) / ath) * 100;
  const diffEl = document.getElementById('dispDiff');
  diffEl.textContent = diff.toFixed(2) + '%';
  diffEl.className = 'pval ' + (diff < -20 ? 'c-red' : diff < -5 ? 'c-yellow' : 'c-green');

  document.getElementById('dispName').textContent = label;
  document.getElementById('dispCurr').textContent = `${name} · ${currency}`;

  // drop cards
  const grid = document.getElementById('dropGrid');
  grid.innerHTML = '';
  DROPS.forEach(pct => {
    const target = ath * (1 - pct/100);
    const rel = ((close - target) / target) * 100;
    const isBelow = close <= target;
    const cls = dropClass(pct);
    const card = document.createElement('div');
    card.className = 'drop-card' + (isBelow ? ' is-below' : '');
    card.innerHTML = `
      ${isBelow ? '<div class="reached-badge">✓ 已到達</div>' : ''}
      <div class="dpct ${cls}">-${pct}%</div>
      <div class="dprice">${fmt(target, dec, prefix)}</div>
      <div style="font-size:10px;color:var(--muted);">ATH: ${fmt(ath, dec, prefix)}</div>
      <div class="dfrom ${isBelow?'below':'above'}">
        ${isBelow ? `現價已低 ${Math.abs(rel).toFixed(1)}%` : `還差 ${rel.toFixed(1)}%`}
      </div>`;
    grid.appendChild(card);
  });

  // calc rows
  const rows = document.getElementById('calcRows');
  rows.innerHTML = '';
  DROPS.forEach(pct => {
    const target = ath * (1 - pct/100);
    const cls = dropClass(pct);
    const row = document.createElement('div');
    row.className = 'calc-row';
    row.innerHTML = `
      <div class="clabel ${cls}">-${pct}%</div>
      <div class="cref">${fmt(target, dec, prefix)}</div>
      <input class="cinput" type="number" min="0" step="100"
        placeholder="加碼金額" oninput="calcTotal()" />`;
    rows.appendChild(row);
  });

  calcTotal();
  ['pricePanel','dropSection','calcSection'].forEach(id => document.getElementById(id).style.display='');
}

function calcTotal() {
  let total = 0;
  document.querySelectorAll('.cinput').forEach(i => {
    const v = parseFloat(i.value);
    if (!isNaN(v) && v > 0) total += v;
  });
  const cfg = ETFS[curETF];
  document.getElementById('totalAmt').textContent =
    cfg.prefix + total.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}

function clearCalc() {
  document.querySelectorAll('.cinput').forEach(i => i.value='');
  calcTotal();
}
</script>
</body>
</html>
